  firstLevelElements: '#333333'
  background: '#FFFFFF'
  tableAccent: '#1351B4'
  good: '#168821'
  neutral: '#FFCD07'
  bad: '#E52207'
  maximum: '#1351B4'
  center: '#5992ED'
  minimum: '#D4E5FF'
  textClasses:
    label:
      fontFace: Trebuchet MS
      fontSize: 10
    title:
      fontFace: Trebuchet MS
      fontSize: 12
      color: '#000000'
    callout:
      fontFace: Trebuchet MS
      fontSize: 24
    header:
      fontFace: Trebuchet MS
      fontSize: 12
  visualStyles:
    '*':
      '*':
        '*':
        - wordWrap: true
        line:
        - transparency: 0
        outline:
        - transparency: 0
        plotArea:
        - transparency: 0
        categoryAxis:
        - showAxisTitle: true
          gridlineStyle: dotted
          concatenateLabels: false
          fontFamily: Trebuchet MS
        valueAxis:
        - showAxisTitle: true
          gridlineStyle: dotted
          fontFamily: Trebuchet MS
        y2Axis:
        - show: true
        title:
        - titleWrap: true
          fontFamily: Trebuchet MS
          fontColor:
            solid:
              color: '#000000'
          alignment: center
        lineStyles:
        - strokeWidth: 3
        wordWrap:
        - show: true
        background:
        - show: true
          transparency: 0
        border:
        - width: 1
        outspacePane:
        - backgroundColor:
            solid:
              color: '#ffffff'
          transparency: 0
          border: true
          borderColor:
            solid:
              color: '#B3B0AD'
        filterCard:
        - $id: Applied
          transparency: 0
          foregroundColor:
            solid:
              color: '#252423'
          border: true
        - $id: Available
          transparency: 0
          foregroundColor:
            solid:
              color: '#252423'
          border: true
        dataLabels:
        - fontFamily: Trebuchet MS
        legend:
        - fontFamily: Trebuchet MS
          position: TopCenter
    scatterChart:
      '*':
        bubbles:
        - bubbleSize: -10
          markerRangeType: auto
        general:
        - responsive: true
        fillPoint:
        - show: true
        legend:
        - showGradientLegend: true
    lineChart:
      '*':
        general:
        - responsive: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
        forecast:
        - matchSeriesInterpolation: true
        seriesLabels:
        - enableBackground: true
          leaderLines: true
          seriesMatchColor: true
    map:
      '*':
        bubbles:
        - bubbleSize: -10
          markerRangeType: auto
    azureMap:
      '*':
        bubbleLayer:
        - bubbleRadius: 8
          minBubbleRadius: 8
          maxRadius: 40
        barChart:
        - barHeight: 3
          thickness: 3
    pieChart:
      '*':
        legend:
        - show: true
          position: RightCenter
        labels:
        - labelStyle: Data value, percent of total
    donutChart:
      '*':
        legend:
        - show: true
          position: RightCenter
        labels:
        - labelStyle: Data value, percent of total
    pivotTable:
      '*':
        rowHeaders:
        - showExpandCollapseButtons: true
          legacyStyleDisabled: true
    multiRowCard:
      '*':
        card:
        - outlineWeight: 2
          barShow: true
          barWeight: 2
    kpi:
      '*':
        trendline:
        - transparency: 20
    cardVisual:
      '*':
        layout:
        - maxTiles: 3
        - $id: default
          cellPadding: 12
          paddingIndividual: false
          paddingUniform: 12
          backgroundShow: true
        overflow:
        - type: 0
        image:
        - $id: default
          position: Left
          imageAreaSize: 20
          padding: 12
          rectangleRoundedCurve: 4
          fit: Normal
          fixedSize: false
        referenceLabel:
        - $id: default
          backgroundColor:
            solid:
              color: backgroundLight
          paddingUniform: 12
          rectangleRoundedCurveCustomStyle: true
          rectangleRoundedCurveLeftBottom: 4
          rectangleRoundedCurveRightBottom: 4
        referenceLabelDetail:
        - $id: default
          detailBackgroundColor:
            solid:
              color: foreground
          detailFontColor:
            solid:
              color: background
        referenceLabelTitle:
        - $id: default
          titleFontColor:
            solid:
              color: foregroundNeutralSecondary
        referenceLabelValue:
        - $id: default
          valueFontFamily: '''Segoe UI Semibold'', wf_segoe-ui_semibold, helvetica, arial, sans-serif'
          fontColor:
            solid:
              color: foreground
        value:
        - $id: default
          fontFamily: '''Segoe UI Semibold'', wf_segoe-ui_semibold, helvetica, arial, sans-serif'
        label:
        - $id: default
          position: belowValue
          fontColor:
            solid:
              color: foregroundNeutralSecondary
        spacing:
        - $id: default
          verticalSpacing: 2
        outline:
        - $id: default
          lineColor:
            solid:
              color: backgroundLight
        divider:
        - $id: default
          dividerColor:
            solid:
              color: backgroundLight
        shapeCustomRectangle:
        - $id: default
          tileShape: rectangleRoundedByPixel
          rectangleRoundedCurve: 4
        smallMultiplesOuterShape:
        - $id: default
          rectangleRoundedCurveCustomStyle: false
          rectangleRoundedCurve: 4
        smallMultiplesHeader:
        - $id: default
          paddingIndividual: false
          paddingUniform: 12
          backgroundColor:
            solid:
              color: backgroundLight
        smallMultiplesLayout:
        - style: Table
          cellPadding: 12
          rowCount: 3
          orientation: 1
          titleOrientation: 1
          headerPosition: Top
        smallMultiplesGrid:
        - gridlineColor:
            solid:
              color: foregroundNeutralTertiary
        smallMultiplesBorder:
        - $id: default
          gridlineColor:
            solid:
              color: foregroundNeutralTertiary
        padding:
        - $id: default
          paddingUniform: 12
          paddingIndividual: false
    advancedSlicerVisual:
      '*':
        layout:
        - maxTiles: 3
        shapeCustomRectangle:
        - $id: default
          tileShape: rectangleRoundedByPixel
          rectangleRoundedCurve: 4
        selectionIcon:
        - $id: default
          size: 12
        value:
        - $id: default
          fontFamily: '''''''Segoe UI Semibold'''', wf_segoe-ui_semibold, helvetica, arial, sans-serif'''
    listSlicer:
      '*':
        layout:
        - showFixedSize: true
    slicer:
      '*':
        general:
        - responsive: true
        date:
        - hideDatePickerButton: false
        items:
        - padding: 4
          accessibilityContrastProperties: true
    waterfallChart:
      '*':
        general:
        - responsive: true
    columnChart:
      '*':
        general:
        - responsive: true
        legend:
        - showGradientLegend: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
    clusteredColumnChart:
      '*':
        general:
        - responsive: true
        legend:
        - showGradientLegend: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
    hundredPercentStackedColumnChart:
      '*':
        general:
        - responsive: true
        legend:
        - showGradientLegend: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
    barChart:
      '*':
        general:
        - responsive: true
        legend:
        - showGradientLegend: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
    clusteredBarChart:
      '*':
        general:
        - responsive: true
        legend:
        - showGradientLegend: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
    hundredPercentStackedBarChart:
      '*':
        general:
        - responsive: true
        legend:
        - showGradientLegend: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
    areaChart:
      '*':
        general:
        - responsive: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
        seriesLabels:
        - enableBackground: true
          leaderLines: true
          seriesMatchColor: true
    stackedAreaChart:
      '*':
        general:
        - responsive: true
        smallMultiplesLayout:
        - backgroundTransparency: 0
          gridLineType: inner
        seriesLabels:
        - enableBackground: true
